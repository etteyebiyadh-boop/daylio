<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Daylio</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <h1>Daylio</h1>
      <p style="text-align:center;">Client &amp; Appointment Manager</p>

      <form id="clientForm">
        <input id="name" placeholder="Client name" required />
        <input id="phone" placeholder="Phone number" required />
        <button type="submit">Add Client</button>
      </form>

      <section>
        <h2>Clients</h2>
        <ul id="clientList"></ul>
      </section>

      <section>
        <h2>Appointments</h2>

        <select id="appointment_client"></select>
        <input id="date" type="date">
        <input id="time" type="time">
        <button type="button" id="addAppointmentBtn">Add Appointment</button>

        <h3>Today</h3>
        <ul id="todayList"></ul>

        <h3>All appointments</h3>
        <ul id="appointmentList"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
